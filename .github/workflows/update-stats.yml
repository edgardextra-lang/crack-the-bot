name: Update Live Stats

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats from bot server
        run: |
          curl -sf --max-time 10 http://155.248.237.104:5051/api/hyperforge/live-stats > stats.json \
            || echo '{"combined_win_rate":0,"sum_pnl_pct":0,"combined_trade_count":0,"bots":[]}' > stats.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --staged --quiet || git commit -m "chore: update live stats" && git push
